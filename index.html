<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css">
<script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>

<title>Seatwork</title>

<style>
body{
    font-family: Times, sans-serif;
    background-color: #E65042;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100%;
    margin-top: 100px;
}

section, form{
    background: #fef3e1;
    border-color: #E65042;
    padding: 25px;
    margin: 15px;
    border-radius:15px;
    width:500px;
    height: 150px;
    border: solid 1px black;

}

.container{
    display:flex;
    flex-direction:column;
    border-color:b77221;
    height: 100%;
}

button{
    margin-top:15px;
    width:100%;
    padding:10px;
    border: 1px solid #E65042;
    border-radius:10px;
    color:#E65042;
  
}
#result{
    margin-top:10px;
    font-weight:bold;
    text-align:center;
}
</style>

</head>

<body>
<div class="container">

    
<section>
<h2>Seatwork 2 Third Quarter</h2>

<label>
<input type="checkbox" id="registered"> Are you registered? (Check if yes) <br>
</label>

<label>
<input type="checkbox" id="medical"> Are you cleared by the clinic? (Check if yes)

</section>

<form>
<label>
Select your grade: <br>

<select id="grade">
<option value="seven">Grade 7</option>
<option value="eight">Grade 8</option>
<option value="nine">Grade 9</option>
<option value="ten">Grade 10</option>
<option value="eleven">Grade 11</option>
<option value="twelve">Grade 12</option>
</select>
<br>


</label>

<label>
Select your section: <br>

<select id="section">
<option value="emerald"> Emerald</option>
<option value="ruby">Ruby</option>
</select>

</label>

<button type="button" py-click="check">Check</button>

<div id="result"></div>

</form>

</div>

<script type="py" src="main.py"></script>

</body>
</html>
